name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 后端测试任务
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      
      - name: Install backend dependencies
        working-directory: ./server
        run: npm ci
      
      - name: Run backend tests with coverage
        working-directory: ./server
        run: npm run test:coverage
      
      - name: Upload backend coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: server/coverage/
          retention-days: 7
      
      - name: Check backend coverage threshold
        working-directory: ./server
        run: |
          echo "Backend coverage report generated"
          # Jest会自动检查覆盖率阈值，如果未达到会失败

  # 前端测试任务
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: ./client
        run: npm ci
      
      - name: Run frontend tests with coverage
        working-directory: ./client
        run: npm run test:coverage
      
      - name: Upload frontend coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: client/coverage/
          retention-days: 7
      
      - name: Check frontend coverage threshold
        working-directory: ./client
        run: |
          echo "Frontend coverage report generated"
          # Vitest会自动检查覆盖率阈值，如果未达到会失败

  # E2E测试任务
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Build client
        working-directory: ./client
        run: npm ci && npm run build
      
      - name: Install server dependencies
        working-directory: ./server
        run: npm ci
      
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
      
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # 覆盖率合并报告任务
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: server/coverage/
      
      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: client/coverage/
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate combined coverage report
        run: npm run test:report
      
      - name: Upload combined coverage report
        uses: actions/upload-artifact@v4
        with:
          name: combined-coverage-report
          path: coverage-report/
          retention-days: 7
      
      - name: Display coverage summary
        run: |
          echo "## Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage-report/summary.md ]; then
            cat coverage-report/summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage report generated successfully" >> $GITHUB_STEP_SUMMARY
          fi

  # 测试状态检查
  test-status:
    name: Test Status Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, e2e-tests, coverage-report]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "Backend tests failed"
            exit 1
          fi
          if [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "Frontend tests failed"
            exit 1
          fi
          if [ "${{ needs.e2e-tests.result }}" != "success" ]; then
            echo "E2E tests failed"
            exit 1
          fi
          if [ "${{ needs.coverage-report.result }}" != "success" ]; then
            echo "Coverage report generation failed"
            exit 1
          fi
          echo "All tests passed successfully!"
